[tox]
# construct==2.9.52 cannot build on Python 3.12+ (it imports the removed `imp`
# module), so the pinned-construct factor only runs up to 3.11; 3.12/3.13 test
# against the current construct release.
envlist =
  clean
  py{38,39,310,311}-{sbp2json,noextra}-construct{2_9_52,}
  py{312,313}-{sbp2json,noextra}
minversion = 1.7.2

[testenv:clean]
deps = coverage
skip_install = true
commands = coverage erase

[testenv]
extras = sbp2json: sbp2json
depends =
  py{38,39,310,311}-{sbp2json,noextra}-construct{2_9_52,}: clean
  py{312,313}-{sbp2json,noextra}: clean
deps =
  construct_2_9_52: construct==2.9.52
  -r{toxinidir}/setup_requirements.txt
  -r{toxinidir}/requirements.txt
  -r{toxinidir}/test_requirements.txt
passenv =
  PYTEST_ADDOPTS
allowlist_externals =
  {toxinidir}/../test_data/sanity.sh
commands =
  py.test -v --reruns 2 sbp tests
  {toxinidir}/../test_data/sanity.sh
sitepackages = False
