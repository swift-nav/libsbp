name: C
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - staging
    tags:
      - "*"
  pull_request:
    paths:
      - "c/**"
      - .github/workflows/c.yaml
      - MODULE.bazel
      - .bazeliskrc
      - .bazelrc
      - .clang-tidy
      - tools/lint/**
      - scripts/lint.sh
      - scripts/generate_code_coverage.sh

jobs:
  ubuntu-lts:
    strategy:
      matrix:
        build_type: ["Debug", "Release"]
        compiler:
          [
            { c: "gcc-7", cxx: "g++-7", package: "gcc-7 g++-7" },
            { c: "clang-6.0", cxx: "clang++-6.0", package: "clang-6.0" },
          ]
        build_shared_libraries: [true, false]

    name: "Ubuntu 20.04 (Build: ${{ matrix.build_type }}, Compilers: ${{ matrix.compiler.c }}/${{ matrix.compiler.cxx }}, Shared Library: ${{ matrix.build_shared_libraries }})"

    # We run on a docker image to avoid being affected from GitHub
    # decommissioning certain runners
    runs-on: ubuntu-latest
    container: ubuntu:20.04

    steps:
      - name: Setup
        run: |
          apt-get -qq update
          apt-get -qq install software-properties-common gpg wget
          add-apt-repository -y ppa:git-core/ppa
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ bionic-rc main' \
            | tee -a /etc/apt/sources.list.d/kitware.list >/dev/null
          apt-get -qq update
          apt-get -qq install libeigen3-dev libserialport-dev git cmake build-essential ${{ matrix.compiler.package }}

      - name: Checkout
        run: |
          git config --global --add safe.directory "${PWD}"
          git init
          git remote add origin "https://github.com/${{ github.repository }}"
          git fetch --no-tags --depth=1 origin "${{ github.sha }}"
          git checkout "${{ github.sha }}"
          git submodule update --recursive --init --depth=1

      - name: Configure
        run: |
          cmake -S c -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.c }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DBUILD_SHARED_LIBS=${{ matrix.build_shared_libraries }} \
            -DCMAKE_INSTALL_PREFIX="$PWD/install" \
            -DINSTALL_GTEST=false \
            -DBUILD_EXAMPLES=true

      - name: Build
        run: cmake --build build --parallel

      - name: Example
        run: cmake --build build --parallel --target examples

      - name: Test
        run: cmake --build build --target do-all-tests

      - name: Install
        run: cmake --build build --target install

      - name: Test Package
        run: |
          cmake -S c/test_package -B c/test_package/build -DCMAKE_PREFIX_PATH="$PWD/install"
          cmake --build c/test_package/build

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: |
          cmake -S c -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" \
            -DINSTALL_GTEST=false

      - name: Build
        run: cmake --build build

      - name: Test
        run: cmake --build build --target do-all-tests

      - name: Install
        run: cmake --build build --target install

      - name: Test Package
        run: |
          cmake -S c/test_package -B c/test_package/build -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"
          cmake --build c/test_package/build

  big-endian:
    name: Test Big Endian
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install gcc-multilib-mips-linux-gnu gcc-mips-linux-gnu qemu-user g++-mips-linux-gnu

      - name: Run big endian tests
        run: make test-c-modern
        env:
          CC: mips-linux-gnu-gcc
          CXX: mips-linux-gnu-g++

          CMAKEFLAGS: -DCMAKE_EXE_LINKER_FLAGS="-static" -Dgtest_disable_pthreads=ON

  bazel:
    name: Bazel
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Bazel Build & Test
        run: |
          bazel test //...

  asan:
    name: ASAN
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true


      - name: Bazel Build & Test
        run: |
          bazel test --config=asan //...

  ubsan:
    name: UBSAN
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Bazel Build & Test
        run: |
          bazel test --config=ubsan //...

  windows-latest:
    strategy:
      matrix:
        generator: ["MinGW Makefiles", "Visual Studio 17 2022"]
        build_shared_libraries: [true, false]
    name: "Windows Latest (Generator: ${{ matrix.generator }}, Shared Library: ${{ matrix.build_shared_libraries }})"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: |
          cmake -G "${{ matrix.generator }}" -S c -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=${{ matrix.build_shared_libraries }} `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -Dgtest_force_shared_crt=true `
            -DINSTALL_GTEST=false

      - name: Build
        run: cmake --build build

      - name: Build Test
        run: cmake --build build --target build-all-tests

      - name: Run Test
        run: cmake --build build --target do-all-tests
        if: ${{ !matrix.build_shared_libraries }}

      - name: Install
        run: cmake --build build --target install

      - name: Test Package
        run: |
          cmake -G "${{ matrix.generator }}" -S c/test_package -B c/test_package/build -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"
          cmake --build c/test_package/build

  code-coverage:
    name: Code Coverage
    permissions:
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Generate code coverage
        id: coverage
        run: |
          ./scripts/generate_code_coverage.sh --html 2>&1 | tee coverage_output.txt
          SOURCE_FILES=$(grep "source files:" coverage_output.txt | sed 's/.*source files: //')
          LINES=$(grep "  lines" coverage_output.txt | sed 's/.*lines[.]*: //')
          BRANCHES=$(grep "  branches" coverage_output.txt | sed 's/.*branches[.]*: //')
          echo "source_files=$SOURCE_FILES" >> "$GITHUB_OUTPUT"
          echo "lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "branches=$BRANCHES" >> "$GITHUB_OUTPUT"

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-html
          path: code_coverage_html/

      - name: Find existing coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- code-coverage-libsbp -->'

      - name: Post coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- code-coverage-libsbp -->
            ## Code Coverage
            | Metric | Coverage |
            |--------|----------|
            | Source files | ${{ steps.coverage.outputs.source_files }} |
            | Lines | ${{ steps.coverage.outputs.lines }} |
            | Branches | ${{ steps.coverage.outputs.branches }} |

  clang-tidy:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run Clang-Tidy
        continue-on-error: true
        id: run_clang_tidy
        run: |
          ./scripts/lint.sh --targets //c/...

      - name: Setup reviewdog
        # Pinning to a specific SHA prevents "tag-shifting" attacks
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        if: github.event_name == 'pull_request'
        with:
          reviewdog_version: v0.21.0

      - name: Run reviewdog with merged SARIF report
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat clang-tidy-output/merged-report.sarif | reviewdog -f=sarif \
            -name="clang-tidy" \
            -reporter=github-pr-review \
            -filter-mode=diff_context \
            -fail-on-error=false \
            -level=warning || echo "Reviewdog completed with status $?"

      - name: Upload SARIF report
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-sarif-report
          path: clang-tidy-output/merged-report.sarif

      - name: Fail if clang-tidy errors were found
        if: steps.run_clang_tidy.outcome == 'failure'
        run: exit 1
